#Display the name of the workflow
name: Demo Workflow

on:
  workflow_dispatch:
    inputs:
      exampleInput:
        description: 'An example input for the workflow'
        required: true
        default: 'Hello, World!'
        
jobs:
  demo_job-1:
    name: job-1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install Bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Check Bats version
        run: bats -v

  demo_job-2:
    name: job-2
    runs-on: ubuntu-latest
    needs: demo_job-1
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.12.8'
      
      - name: Run Python script
        run: python ../test.py

      - name: Display input
        run: |
          echo "The input provided is: ${{ github.event.inputs.exampleInput }}"