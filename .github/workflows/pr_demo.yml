#Display the name of the workflow
name: Demo Workflow

on:
  workflow_dispatch:
    inputs:
      exampleInput:
        description: 'An example input for the workflow'
        required: true
        default: 'Hello, World!'
        
jobs:
  demo_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Display input
        run: |
          echo "The input provided is: ${{ github.event.inputs.exampleInput }}"