#Basic chaining with a push listener example 

name: Chaining demo
on:
  push:
    branches:
      - chaining_demo

jobs:
  job-1:
    name: Job 1
    runs-on: ubuntu-latest
    steps:
      - name: first Job
        run: echo "This is Job 1"

  job-2:
    name: Job 2
    runs-on: ubuntu-latest
    needs: job-1
    steps:
      - name: second Job
        run: echo "This is Job 2"

  job-3:
    name: Job 3
    runs-on: ubuntu-latest
    needs: job-2
    steps:
      - name: third Job
        run: echo "This is Job 3"

